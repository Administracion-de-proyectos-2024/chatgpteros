{% extends 'layouts/base-fullscreen.html' %}

{% block content %}
{% include 'includes/navigation-fullscreen.html' %}

{% load crispy_forms_tags %}


<main class="main-content  mt-0">
  <section>
    <div class="page-header min-vh-75">
      <div class="container">
        <div class="row">
          <div class="col-xl-4 col-lg-5 col-md-6 d-flex flex-column mx-auto">
            <div class="card card-plain mt-8">
              <div class="card-header pb-0 text-left bg-transparent">
                <h3 class="font-weight-bolder text-info text-gradient">
                  Registrarse 
                </h3>
              </div>
              <div class="card-body">
                <form action="" method="post">{% csrf_token %}
                  <div class="card mx_auto" style="width: 30rem;">
                    <div class="card-body">
                      <p class="card-text">Complete los campos para crear su usuario</p>
                      {{ form|crispy }}
                      <div class="text-center">
                        <button type="submit" class="btn bg-gradient-info w-100 mt-1 mb-0">Iniciar Sesión</button>
                        <p class="mt-4">
                          No tienes una cuenta? 
                          <a href="{% url 'core_app:register' %}" class="text-primary">Registrarse</a>
                        </p>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

{% endblock %}
