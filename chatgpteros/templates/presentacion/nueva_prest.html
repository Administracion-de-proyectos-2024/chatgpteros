{% extends 'layouts/base-fullscreen.html' %}

{% block content %}
{% include 'includes/navigation-fullscreen.html' %}

{% load crispy_forms_tags %}

<main class="main-content mt-0 d-flex justify-content-center align-items-center">
  <section>
    <div class="page-header min-vh-60" style="margin-top: 100px;">
      <h3>Nueva presentacion</h3>
    </div>
    <div style="width: 1500px; margin-top: 0px;">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form | crispy }}
          <button class="btn btn-sm btn-primary float-end" type="submit">Agregar</button>
        </form>
      </div>
    </div>
  </section>
</main>

{% endblock %}
