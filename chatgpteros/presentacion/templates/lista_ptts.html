{% extends 'base.html' %}

{% block content %}

{% load crispy_forms_tags %}

<h3>Lista de presentaciones</h3>
    
<br>
    <ol>
        {% for presentacion in presentaciones %}
            <li>
                <!-- Se abrira una pantalla de tamaño predeterminado -->
                <a href="{% url 'presentar' presentacion.id %}" onclick="window.open(this.href, '_blank', 'width=500,height=500'); return false;">{{presentacion}}</a>
            </li>
        {% endfor %}
    </ol>
{% endblock %}
